version: 2

models:
  - name: fct_item_snapshot
    columns:
      - name: item_id
        tests:
          - not_null
      - name: snapshot_timestamp
        tests:
          - not_null
      - name: min_price_gold
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - item_id
              - snapshot_timestamp